<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>JavaScript Demo RHS</title>
</head>

<body>

    <!DOCTYPE html>
    <html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Ejemplos de Sintaxis JavaScript</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body class="bg-light">

        <div class="container mt-4">

            <h1 class="text-center mb-4">Ejemplos de JavaScript - Ricardo Hernandez Salas</h1>

            <!-- If else -->
            <div class="card mb-3">
                <div class="card-body">
                    <h4>Usos de If  - Else </h4>

                    <input id="edad" class="form-control mb-2" placeholder="Ingrese su edad">
                    <button class="btn btn-primary" onclick="verificarEdad()">Verificar</button>

                    <p id="resultadoEdad" class="mt-2"></p>

                </div>
            </div>

            <!-- SWITCH -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Switch</h4>

                    <input id="dia" class="form-control mb-2" placeholder="Ingrese un número del 1 al 3">
                    <button class="btn btn-primary" onclick="mostrarDia()">Mostrar día</button>

                    <p id="resultadoDia"></p>

                </div>
            </div>

            <!-- Objeto error -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Manejo de errores (try / catch)</h4>

                    <button class="btn btn-danger" onclick="probarError()">Generar error</button>
                    <p id="errorMsg"></p>

                </div>
            </div>

            <!-- bucles -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Bucles (for)</h4>

                    <button class="btn btn-success" onclick="mostrarNumeros()">Mostrar números</button>
                    <p id="numeros"></p>

                </div>
            </div>

            <!-- creacion de funciones -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Funciones</h4>

                    <input id="num1" class="form-control mb-2" placeholder="Número 1">
                    <input id="num2" class="form-control mb-2" placeholder="Número 2">

                    <button class="btn btn-primary" onclick="sumar()">Sumar</button>

                    <p id="resultadoSuma"></p>

                </div>
            </div>

            <!-- Operadores logicos -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Operadores</h4>

                      <input id="num1F" class="form-control mb-2" placeholder="Número 1">
                    <input id="num2F" class="form-control mb-2" placeholder="Número 2">


                    <button class="btn btn-secondary" onclick="operadores()">Ejecutar operadores</button>
                    <p id="resultadoOperadores"></p>

                </div>
            </div>

            <!--  number y math -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>number y clase Math</h4>

                    <button class="btn btn-info" onclick="calcularMath()">Calcular raíz cuadrada de 64</button>
                    <p id="resultadoMath"></p>

                </div>
            </div>

            <!-- fechas -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Objeto Date</h4>

                    <button class="btn btn-dark" onclick="mostrarFecha()">Mostrar fecha actual</button>
                    <p id="fecha"></p>

                </div>
            </div>

            <!-- strings -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Strings</h4>

                    <button class="btn btn-warning" onclick="usarString()">Convertir texto</button>
                    <p id="texto"></p>

                </div>
            </div>

            <!-- arrays -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Arreglos</h4>

                    <button class="btn btn-primary" onclick="mostrarArreglo()">Mostrar arreglo</button>
                    <p id="arreglo"></p>

                </div>
            </div>

            <!-- dom -->
            <div class="card mb-3">
                <div class="card-body">

                    <h4>Manipular DOM</h4>

                    <p class="claseEjemplo">Elemento 1</p>
                    <p class="claseEjemplo">Elemento 2</p>

                    <button class="btn btn-success" onclick="cambiarColor()">Cambiar color</button>

                </div>
            </div>

        </div>

        <script src="script.js"></script>

    </body>

    </html>






    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>


</body>

</html>
